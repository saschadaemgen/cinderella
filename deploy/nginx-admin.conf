# Cinderella admin console — nginx reverse proxy (A3 §1, §6).
#
# The admin server binds to 127.0.0.1:8787 (ADMIN_PORT) and is NEVER exposed
# directly. nginx terminates TLS (Let's Encrypt) and proxies to it.
#
# Install:
#   cp deploy/nginx-admin.conf /etc/nginx/sites-available/cinderella-admin
#   ln -s ../sites-available/cinderella-admin /etc/nginx/sites-enabled/
#   certbot --nginx -d admin.cinderella.example.org   # replace with your domain
#   nginx -t && systemctl reload nginx
#
# Replace admin.cinderella.example.org and the certificate paths with real
# values on the server — never commit real hostnames to this public repo.

server {
    listen 80;
    listen [::]:80;
    server_name admin.cinderella.example.org;
    # Certbot manages the ACME challenge; everything else goes to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.cinderella.example.org;

    ssl_certificate     /etc/letsencrypt/live/admin.cinderella.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.cinderella.example.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # HSTS (the app sets the rest of its security headers itself).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Don't advertise the console.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        # ------------------------------------------------------------------
        # OPTIONAL defense in depth (A3 §6) — uncomment one or both:
        #
        # (a) IP allowlist — only the operator's addresses reach the console:
        #   allow 192.0.2.10;        # <- your static IP (placeholder)
        #   allow 198.51.100.0/24;   # <- your VPN range (placeholder)
        #   deny all;
        #
        # (b) HTTP Basic auth in front of the app's own login:
        #   htpasswd -c /etc/nginx/cinderella.htpasswd operator
        #   auth_basic "Restricted";
        #   auth_basic_user_file /etc/nginx/cinderella.htpasswd;
        # ------------------------------------------------------------------

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # htmx uses standard requests — no websocket upgrades needed.
        client_max_body_size 1m;
    }
}
