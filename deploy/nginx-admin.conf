# Cinderella admin console — public nginx vhost over Let's Encrypt TLS (Addendum 4).
#
# The console is public and appless, secured by passkeys (WebAuthn) — not by
# network location. nginx terminates TLS and reverse-proxies to Fastify on
# 127.0.0.1. Replace cinderella.example.org with the real admin hostname; keep
# the real hostname out of this public repo (set it on the server).
#
# Issue the cert without permanently rewriting vhosts, then enable this file:
#   certbot certonly --nginx -d cinderella.example.org
#   cp deploy/nginx-admin.conf /etc/nginx/sites-available/cinderella-admin
#   ln -sf ../sites-available/cinderella-admin /etc/nginx/sites-enabled/cinderella-admin
#   nginx -t && systemctl reload nginx     # reload, never restart (shared host)
#
# WebAuthn requires a secure context + a domain-based RP ID — this public
# hostname + real TLS satisfies it (a bare IP or plain HTTP would not).
# This supersedes Addendum 3's WireGuard-interface vhost; remove that one.

server {
    listen 80;
    listen [::]:80;
    server_name cinderella.example.org;
    # Let certbot answer ACME HTTP-01 here; everything else goes to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cinderella.example.org;

    ssl_certificate     /etc/letsencrypt/live/cinderella.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cinderella.example.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # The app also sets HSTS from its (configurable) settings; this is the edge
    # backstop. Enable `preload` only once you are certain (it is hard to undo).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Unknown Host headers never reach Cinderella: this server matches only the
    # exact server_name, and it is NOT marked default_server, so other hosts fall
    # through to nginx's existing default handling (return 444 there if desired).

    # Public archive front (CCB-S2-003) — INDEXABLE (the SEO goal). `add_header` in a
    # location REPLACES the server-level add_headers, so HSTS is re-added here and the
    # admin's noindex X-Robots-Tag is deliberately NOT inherited. The app sets the
    # embed's own CSP/framing/cache headers; nginx only fixes the robots policy + TLS.
    location /embed/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 1m;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Robots-Tag "index, follow" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 1m;
    }
}
