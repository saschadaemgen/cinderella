# Cinderella admin console — nginx reverse proxy over WireGuard (Addendum 3).
#
# The console is reachable ONLY over the WireGuard tunnel. This vhost binds to the
# WireGuard interface IP (10.8.0.1) on a dedicated port and is NEVER on the public
# interface. Fastify stays on 127.0.0.1; nginx terminates TLS.
#
# Why WireGuard (not a public IP-allowlist / obscure hostname): the operator is on
# Starlink (CGNAT — shared, rotating public IPv4), so an IP allowlist is both too
# broad and too fragile, and certbot would leak an obscure hostname into public
# Certificate Transparency logs. WireGuard authenticates by key and roams across
# IP changes, giving the console zero public attack surface.
#
# Port note: pick a port with no wildcard listener on the host. If another service
# already wildcard-binds your first choice (e.g. *:8443), a specific-IP bind loses
# to it — verify with `ss -tlnp 'sport = :<port>'` and choose a free port.
#
# TLS options (see deploy/wireguard.md):
#   - self-signed cert with an IP SAN for 10.8.0.1 (one-time browser trust prompt), or
#   - a real Let's Encrypt cert via DNS-01 for a hostname whose public A-record
#     points at the private 10.8.0.1 (valid cert, still tunnel-only).

server {
    # WireGuard interface only — never 0.0.0.0. Requires net.ipv4.ip_nonlocal_bind=1
    # so nginx can bind before wg0 is up (keeps the shared nginx independent of the
    # tunnel; do NOT add an After=wg-quick dependency that could block other sites).
    listen 10.8.0.1:9443 ssl;
    http2 on;
    server_name cinderella.wg 10.8.0.1;

    ssl_certificate     /etc/cinderella/tls/cert.pem;
    ssl_certificate_key /etc/cinderella/tls/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 1m;
    }
}
